    <!-- Frontend Logic -->
    <script>
        // --- App State ---
        let currentUser = null;
        let selectedDocument = null;
        let currentTab = 'chat';
        let libraryDocuments = [];
        let currentJsonOutput = null;

        // --- API Configuration ---
        const API_BASE_URL = window.location.origin;
        
        // Polling interval for status updates (ms)
        const STATUS_POLL_INTERVAL = 2000;
        
        // Status polling for processing documents
        let statusPollingInterval = null;

        // --- Tab Switching ---
        function switchTab(tab) {
            currentTab = tab;
            
            // Update tab buttons
            document.getElementById('tab-chat').className = tab === 'chat' ? 'tab-active px-6 py-3 rounded-t-lg font-medium text-sm transition-colors border border-b-0' : 'tab-inactive px-6 py-3 rounded-t-lg font-medium text-sm transition-colors border border-b-0';
            document.getElementById('tab-library').className = tab === 'library' ? 'tab-active px-6 py-3 rounded-t-lg font-medium text-sm transition-colors border border-b-0' : 'tab-inactive px-6 py-3 rounded-t-lg font-medium text-sm transition-colors border border-b-0';
            
            // Update content visibility
            document.getElementById('content-chat').className = tab === 'chat' ? 'flex-1 flex flex-col h-full' : 'flex-1 flex flex-col h-full hidden';
            document.getElementById('content-library').className = tab === 'library' ? 'flex-1 flex flex-col h-full' : 'flex-1 flex flex-col h-full hidden';
            
            // Load library documents when switching to library tab
            if (tab === 'library') {
                loadLibraryDocuments();
            }
        }

        // --- Status Polling ---
        function startStatusPolling() {
            if (statusPollingInterval) return;
            
            statusPollingInterval = setInterval(async () => {
                try {
                    const response = await fetch(`${API_BASE_URL}/api/queue/status`);
                    if (!response.ok) return;
                    
                    const queueStatus = await response.json();
                    const isProcessing = queueStatus.processing_count > 0 || queueStatus.queued_count > 0;
                    
                    if (isProcessing) {
                        if (currentTab === 'chat') {
                            loadDocumentList();
                        } else {
                            loadLibraryDocuments();
                        }
                        
                        // Update details panel if open
                        if (selectedDocument && ['queued', 'processing'].includes(selectedDocument.status)) {
                            await loadDocumentDetails(selectedDocument.id);
                        }
                    } else {
                        stopStatusPolling();
                    }
                } catch (error) {
                    console.error('Status polling failed:', error);
                }
            }, STATUS_POLL_INTERVAL);
        }
        
        function stopStatusPolling() {
            if (statusPollingInterval) {
                clearInterval(statusPollingInterval);
                statusPollingInterval = null;
            }
        }

        // --- Auth Logic ---
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('login-username').value.trim();
            if (username) {
                currentUser = username;
                document.getElementById('display-username').textContent = currentUser;

                // Hide overlay with animation
                const overlay = document.getElementById('login-overlay');
                overlay.classList.add('opacity-0');
                setTimeout(() => {
                    overlay.classList.add('hidden');
                    overlay.classList.remove('opacity-0');
                }, 300);

                // Load document list
                loadDocumentList();
            }
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            currentUser = null;
            document.getElementById('login-username').value = '';
            document.getElementById('login-password').value = '';

            // Show overlay
            const overlay = document.getElementById('login-overlay');
            overlay.classList.remove('hidden');

            // Clear chat history
            const messages = document.getElementById('chat-container').querySelectorAll('.animate-fade-in-up');
            messages.forEach(msg => msg.remove());
        });

        // --- File Upload Logic (Chat Tab) ---
        document.getElementById('attach-btn').addEventListener('click', () => {
            document.getElementById('file-upload').click();
        });

        document.getElementById('file-upload').addEventListener('change', async (e) => {
            await handleFileUpload(e.target.files[0], true);
            e.target.value = '';
        });

        // --- File Upload Logic (Library Tab) ---
        document.getElementById('library-file-upload').addEventListener('change', async (e) => {
            await handleFileUpload(e.target.files[0], false);
            e.target.value = '';
        });

        async function handleFileUpload(file, showChatNotification) {
            if (!file) return;

            const now = new Date();
            const timeStr = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
            const fileSize = (file.size / 1024 / 1024).toFixed(2) + ' MB';

            const newDoc = {
                id: `temp_${Date.now()}`,
                name: file.name,
                path: `/data/pdfs/${file.name}`,
                size: fileSize === '0.00 MB' ? '< 0.01 MB' : fileSize,
                date: timeStr,
                uploader: currentUser || 'You',
                status: 'queued',
                progress: 0
            };

            libraryDocuments.unshift(newDoc);
            if (currentTab === 'library') {
                renderLibraryGrid();
            }
            startStatusPolling();

            if (showChatNotification) {
                appendMessage('bot', `📤 Started uploading **${file.name}**... Please wait.`);
            }

            try {
                const formData = new FormData();
                formData.append('file', file);
                formData.append('username', currentUser || 'anonymous');

                const response = await fetch(`${API_BASE_URL}/api/upload`, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || 'Upload failed');
                }

                const result = await response.json();
                
                const docIndex = libraryDocuments.findIndex(d => d.id === newDoc.id);
                if (docIndex !== -1) {
                    libraryDocuments[docIndex] = {
                        id: result.file.id,
                        name: result.file.name,
                        path: result.file.path,
                        size: result.file.size,
                        date: timeStr,
                        uploader: currentUser || 'You',
                        status: result.file.status,
                        progress: result.file.progress || 0
                    };
                }
                
                if (currentTab === 'library') {
                    renderLibraryGrid();
                }
                
                if (showChatNotification) {
                    appendMessage('bot', `✅ Upload complete! **${file.name}** is queued for processing.\n\n📊 File size: ${result.file.size}\n\nProcessing will start automatically.`);
                }
                
            } catch (error) {
                const docIndex = libraryDocuments.findIndex(d => d.id === newDoc.id);
                if (docIndex !== -1) {
                    libraryDocuments[docIndex].status = 'Failed';
                }
                if (currentTab === 'library') {
                    renderLibraryGrid();
                }
                
                if (showChatNotification) {
                    appendMessage('bot', `❌ Upload failed: ${error.message}\n\nPlease try again or check if the file is a valid PDF.`);
                }
            }
        }

        // --- Chat Tab: Document List ---
        async function loadDocumentList() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/documents`);
                if (response.ok) {
                    const data = await response.json();
                    if (data.success && data.documents) {
                        libraryDocuments = data.documents.map(doc => ({
                            ...doc,
                            uploader: doc.uploader || 'System',
                            date: new Date(doc.date * 1000).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) || doc.date,
                            status: doc.status || 'Ready',
                            progress: doc.progress || 100
                        }));
                        renderDocumentList();
                        
                        const isProcessing = libraryDocuments.some(d => ['queued', 'processing'].includes(d.status));
                        if (isProcessing) {
                            startStatusPolling();
                        }
                    }
                }
            } catch (error) {
                console.error('Failed to load documents:', error);
            }
        }

        function renderDocumentList() {
            const docListContainer = document.getElementById('document-list');
            docListContainer.innerHTML = '';
            
            libraryDocuments.forEach(doc => {
                const li = document.createElement('li');
                const isProcessing = ['queued', 'processing'].includes(doc.status);
                const isFailed = doc.status === 'Failed' || doc.status === 'failed';
                const isCompleted = doc.status === 'completed' || doc.status === 'Ready';
                
                li.className = `group flex items-start p-3 rounded-xl transition-colors border border-transparent 
                    ${isProcessing ? 'bg-slate-800/50' : ''}
                    ${isFailed ? 'bg-red-900/20 opacity-80' : ''}
                    ${isCompleted ? 'hover:bg-slate-800 cursor-pointer hover:border-slate-700/50' : ''}`;

                if (isCompleted) {
                    li.onclick = () => tagDocument(doc.path);
                }

                let progressHtml = '';
                if (isProcessing) {
                    const progress = doc.progress || 0;
                    progressHtml = `
                        <div class="mt-2">
                            <div class="flex justify-between text-[9px] text-slate-400 mb-1">
                                <span>${doc.status === 'processing' ? 'Processing...' : 'Queued'}</span>
                                <span>${Math.round(progress)}%</span>
                            </div>
                            <div class="w-full h-1.5 bg-slate-700 rounded-full overflow-hidden">
                                <div class="h-full bg-blue-500 transition-all duration-300" style="width: ${progress}%"></div>
                            </div>
                        </div>
                    `;
                }
                
                let statusHtml = '';
                if (isProcessing) {
                    statusHtml = `<span class="text-blue-400 font-medium flex items-center text-[10px] mt-1.5"><i class="fas fa-${doc.status === 'processing' ? 'cog fa-spin' : 'clock'} mr-1.5"></i> ${doc.status.charAt(0).toUpperCase() + doc.status.slice(1)}</span>`;
                } else if (isFailed) {
                    statusHtml = `<span class="text-red-400 font-medium flex items-center text-[10px] mt-1.5"><i class="fas fa-exclamation-circle mr-1.5"></i> Failed</span>`;
                } else {
                    statusHtml = `<span class="text-emerald-500 flex items-center text-[10px] mt-1.5"><i class="fas fa-check-circle mr-1.5"></i> Ready</span>`;
                }

                const uploaderBadge = (doc.uploader === currentUser || doc.uploader === 'You')
                    ? `<span class="text-blue-300 font-medium">${doc.uploader}</span>`
                    : `<span class="text-slate-500">${doc.uploader}</span>`;

                li.innerHTML = `
                    <div class="mr-3 p-2.5 bg-slate-800 group-hover:bg-blue-600/20 group-hover:text-blue-400 rounded-lg text-slate-400 transition-colors mt-0.5">
                        <i class="fas ${isProcessing ? 'fa-cog text-blue-400' : isFailed ? 'fa-file-pdf text-red-400' : 'fa-file-pdf'}"></i>
                    </div>
                    <div class="flex-1 min-w-0">
                        <h3 class="text-sm font-medium text-slate-200 truncate group-hover:text-white transition-colors" title="${doc.name}">${doc.name}</h3>
                        <p class="text-[10px] text-slate-400 mt-1 flex justify-between pr-2">
                            <span>By: ${uploaderBadge}</span>
                            <span class="text-slate-500">${doc.size}</span>
                        </p>
                        <p class="text-[10px] text-slate-500 mt-0.5">${doc.date}</p>
                        ${statusHtml}
                        ${progressHtml}
                    </div>
                    ${isCompleted ? `
                    <div class="opacity-0 group-hover:opacity-100 transition-opacity text-slate-400 hover:text-white self-center">
                        <i class="fas fa-plus-circle text-sm"></i>
                    </div>
                    ` : ''}
                `;
                docListContainer.appendChild(li);
            });
        }

        function tagDocument(filepath) {
            const chatInput = document.getElementById('chat-input');
            const currentVal = chatInput.value;
            const tagText = `[Doc: ${filepath}] `;

            if (currentVal.length === 0 || currentVal.endsWith(' ')) {
                chatInput.value += tagText;
            } else {
                chatInput.value += ' ' + tagText;
            }

            chatInput.focus();
            chatInput.style.height = 'auto';
            chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
        }

        // --- Library Tab: Document Grid ---
        async function loadLibraryDocuments() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/documents`);
                if (response.ok) {
                    const data = await response.json();
                    if (data.success && data.documents) {
                        libraryDocuments = data.documents.map(doc => ({
                            ...doc,
                            uploader: doc.uploader || 'System',
                            date: new Date(doc.date * 1000).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) || doc.date,
                            status: doc.status || 'Ready',
                            progress: doc.progress || 100
                        }));
                        renderLibraryGrid();
                        
                        const isProcessing = libraryDocuments.some(d => ['queued', 'processing'].includes(d.status));
                        if (isProcessing) {
                            startStatusPolling();
                        }
                    }
                }
            } catch (error) {
                console.error('Failed to load library documents:', error);
            }
        }

        function filterLibrary() {
            const searchTerm = document.getElementById('library-search').value.toLowerCase();
            renderLibraryGrid(searchTerm);
        }

        function renderLibraryGrid(searchTerm = '') {
            const grid = document.getElementById('library-grid');
            const emptyState = document.getElementById('library-empty');
            grid.innerHTML = '';
            
            const filtered = libraryDocuments.filter(doc => 
                doc.name.toLowerCase().includes(searchTerm) ||
                (doc.uploader && doc.uploader.toLowerCase().includes(searchTerm))
            );

            if (filtered.length === 0) {
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
            } else {
                emptyState.classList.add('hidden');
                emptyState.classList.remove('flex');
                
                filtered.forEach(doc => {
                    const card = document.createElement('div');
                    const isProcessing = ['queued', 'processing'].includes(doc.status);
                    const isFailed = doc.status === 'Failed' || doc.status === 'failed';
                    const isCompleted = doc.status === 'completed' || doc.status === 'Ready';
                    
                    card.className = `pdf-card bg-white rounded-xl border ${isFailed ? 'border-red-200' : 'border-slate-200'} p-4 cursor-pointer ${isCompleted ? 'hover:border-blue-300' : ''}`;
                    card.ondblclick = () => previewPDFByDoc(doc);
                    card.onclick = (e) => {
                        e.stopPropagation();
                        selectDocument(doc);
                    };

                    let statusBadge = '';
                    if (isProcessing) {
                        statusBadge = `<span class="text-blue-600 text-xs font-medium flex items-center"><i class="fas fa-circle-notch fa-spin mr-1.5"></i> ${doc.status.charAt(0).toUpperCase() + doc.status.slice(1)}</span>`;
                    } else if (isFailed) {
                        statusBadge = `<span class="text-red-600 text-xs font-medium flex items-center"><i class="fas fa-exclamation-circle mr-1.5"></i> Failed</span>`;
                    } else {
                        statusBadge = `<span class="text-green-600 text-xs font-medium flex items-center"><i class="fas fa-check-circle mr-1.5"></i> Ready</span>`;
                    }

                    card.innerHTML = `
                        <div class="flex items-start justify-between mb-3">
                            <div class="bg-red-100 text-red-600 p-3 rounded-lg">
                                <i class="fas fa-file-pdf text-xl"></i>
                            </div>
                            ${statusBadge}
                        </div>
                        <h3 class="font-medium text-slate-800 truncate mb-1" title="${doc.name}">${doc.name}</h3>
                        <div class="text-xs text-slate-500 space-y-1">
                            <p><i class="fas fa-hdd mr-1.5"></i>${doc.size}</p>
                            <p><i class="fas fa-calendar mr-1.5"></i>${doc.date}</p>
                            <p><i class="fas fa-user mr-1.5"></i>${doc.uploader}</p>
                        </div>
                        ${isProcessing ? `
                        <div class="mt-3">
                            <div class="flex justify-between text-[10px] text-slate-500 mb-1">
                                <span>Processing</span>
                                <span>${Math.round(doc.progress)}%</span>
                            </div>
                            <div class="w-full h-1.5 bg-slate-200 rounded-full overflow-hidden">
                                <div class="h-full bg-blue-500 transition-all duration-300" style="width: ${doc.progress}%"></div>
                            </div>
                        </div>
                        ` : ''}
                    `;
                    grid.appendChild(card);
                });
            }
        }

        async function selectDocument(doc) {
            selectedDocument = doc;
            
            // Show details panel
            const panel = document.getElementById('details-panel');
            panel.classList.remove('hidden');
            
            // Populate details
            document.getElementById('detail-name').textContent = doc.name;
            document.getElementById('detail-size').textContent = doc.size;
            document.getElementById('detail-date').textContent = doc.date;
            document.getElementById('detail-uploader').textContent = doc.uploader;
            
            // Update status
            const statusEl = document.getElementById('detail-status');
            const progressContainer = document.getElementById('detail-progress-container');
            
            if (['queued', 'processing'].includes(doc.status)) {
                progressContainer.classList.remove('hidden');
                document.getElementById('detail-progress-bar').style.width = `${doc.progress}%`;
                document.getElementById('detail-progress-text').textContent = `${Math.round(doc.progress)}%`;
                statusEl.textContent = doc.status.charAt(0).toUpperCase() + doc.status.slice(1);
                statusEl.className = 'text-xs text-blue-600 font-medium';
            } else if (doc.status === 'Failed' || doc.status === 'failed') {
                progressContainer.classList.add('hidden');
                statusEl.textContent = 'Failed';
                statusEl.className = 'text-xs text-red-600 font-medium';
            } else {
                progressContainer.classList.add('hidden');
                statusEl.textContent = 'Ready';
                statusEl.className = 'text-xs text-green-600 font-medium';
                
                // Load full details for completed documents
                await loadDocumentDetails(doc.id);
            }
        }

        async function loadDocumentDetails(docId) {
            try {
                const response = await fetch(`${API_BASE_URL}/api/status/${docId}`);
                if (response.ok) {
                    const details = await response.json();
                    
                    if (selectedDocument && selectedDocument.id === docId) {
                        // Update progress
                        if (['queued', 'processing'].includes(details.status)) {
                            document.getElementById('detail-progress-bar').style.width = `${details.progress}%`;
                            document.getElementById('detail-progress-text').textContent = `${Math.round(details.progress)}%`;
                        }
                        
                        // Update page count if available
                        if (details.page_count) {
                            document.getElementById('detail-pages').textContent = details.page_count;
                        }
                    }
                    
                    // Update in library
                    const idx = libraryDocuments.findIndex(d => d.id === docId);
                    if (idx !== -1) {
                        libraryDocuments[idx] = { ...libraryDocuments[idx], ...details };
                        if (currentTab === 'library') {
                            renderLibraryGrid();
                        }
                    }
                }
            } catch (error) {
                console.error('Failed to load document details:', error);
            }
        }

        function closeDetailsPanel() {
            document.getElementById('details-panel').classList.add('hidden');
            selectedDocument = null;
        }

        function previewPDFByDoc(doc) {
            const modal = document.getElementById('pdf-preview-modal');
            const frame = document.getElementById('pdf-preview-frame');
            const title = document.getElementById('preview-title');
            
            title.textContent = doc.name;
            frame.src = `${API_BASE_URL}/api/pdf/${doc.id}/preview`;
            document.getElementById('preview-open-new').href = frame.src;
            
            modal.classList.remove('hidden');
        }

        function previewPDF() {
            if (!selectedDocument) return;
            previewPDFByDoc(selectedDocument);
        }

        function closePreviewModal() {
            const modal = document.getElementById('pdf-preview-modal');
            const frame = document.getElementById('pdf-preview-frame');
            frame.src = '';
            modal.classList.add('hidden');
        }

        function downloadPDF() {
            if (!selectedDocument) return;
            window.location.href = `${API_BASE_URL}/api/pdf/${selectedDocument.id}/download`;
        }

        async function viewProcessedOutput() {
            if (!selectedDocument) return;
            
            try {
                const response = await fetch(`${API_BASE_URL}/api/pdf/${selectedDocument.id}/output`);
                if (response.ok) {
                    const jsonData = await response.json();
                    currentJsonOutput = jsonData;
                    
                    const content = document.getElementById('json-output-content');
                    content.innerHTML = syntaxHighlight(jsonData);
                    
                    const modal = document.getElementById('json-output-modal');
                    modal.classList.remove('hidden');
                    
                    // Also show in details panel preview
                    const previewContainer = document.getElementById('processed-output-preview');
                    const previewContent = document.getElementById('processed-output-content');
                    previewContent.innerHTML = syntaxHighlight(jsonData);
                    previewContainer.classList.remove('hidden');
                }
            } catch (error) {
                alert('Failed to load processed output. The document may still be processing.');
            }
        }

        function closeJsonModal() {
            document.getElementById('json-output-modal').classList.add('hidden');
            currentJsonOutput = null;
        }

        function copyJsonOutput() {
            if (!currentJsonOutput) return;
            navigator.clipboard.writeText(JSON.stringify(currentJsonOutput, null, 2));
        }

        function downloadProcessedOutput() {
            if (!selectedDocument) return;
            window.location.href = `${API_BASE_URL}/api/pdf/${selectedDocument.id}/output/download`;
        }

        function syntaxHighlight(json) {
            if (typeof json !== 'string') {
                json = JSON.stringify(json, null, 2);
            }
            json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function (match) {
                var cls = 'json-number';
                if (/^"/.test(match)) {
                    if (/:$/.test(match)) {
                        cls = 'json-key';
                    } else {
                        cls = 'json-string';
                    }
                } else if (/true|false/.test(match)) {
                    cls = 'json-boolean';
                } else if (/null/.test(match)) {
                    cls = 'json-null';
                }
                return '<span class="' + cls + '">' + match + '</span>';
            });
        }

        // --- Chat Interaction Logic ---
        const chatForm = document.getElementById('chat-form');
        const chatInput = document.getElementById('chat-input');
        const chatContainer = document.getElementById('chat-container');
        const sendBtn = document.getElementById('send-btn');

        chatInput.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                chatForm.dispatchEvent(new Event('submit'));
            }
        });

        function appendMessage(sender, text) {
            const isUser = sender === 'user';
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex ${isUser ? 'justify-end' : 'justify-start'} mb-6 animate-fade-in-up`;

            const bubbleDiv = document.createElement('div');
            bubbleDiv.className = `p-4 max-w-[85%] md:max-w-[75%] shadow-sm ${isUser
                    ? 'bg-blue-600 text-white rounded-2xl rounded-tr-sm'
                    : 'bg-white border border-slate-200 text-slate-800 rounded-2xl rounded-tl-sm'
                }`;

            let formattedText = text.replace(/\[Doc:\s([^\]]+)\]/g, '<span class="inline-block bg-blue-500/20 text-blue-100 px-2 py-0.5 rounded text-xs font-mono mb-1 mr-1 border border-blue-500/30"><i class="fas fa-paperclip mr-1"></i>$1</span>');
            formattedText = formattedText.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            formattedText = formattedText.replace(/\n/g, '<br>');

            bubbleDiv.innerHTML = `<p class="text-sm md:text-base leading-relaxed">${formattedText}</p>`;
            msgDiv.appendChild(bubbleDiv);
            chatContainer.appendChild(msgDiv);
            scrollToBottom();
        }

        function appendLoadingIndicator() {
            const msgDiv = document.createElement('div');
            msgDiv.id = 'loading-indicator';
            msgDiv.className = `flex justify-start mb-6`;
            msgDiv.innerHTML = `
                <div class="bg-white border border-slate-200 rounded-2xl rounded-tl-sm shadow-sm p-4 py-5 flex items-center typing-indicator">
                    <span></span><span></span><span></span>
                </div>
            `;
            chatContainer.appendChild(msgDiv);
            scrollToBottom();
        }

        function removeLoadingIndicator() {
            const indicator = document.getElementById('loading-indicator');
            if (indicator) indicator.remove();
        }

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = chatInput.value.trim();
            if (!message) return;

            appendMessage('user', message);
            chatInput.value = '';
            chatInput.style.height = 'auto';
            sendBtn.disabled = true;
            appendLoadingIndicator();

            try {
                const response = await fetch(`${API_BASE_URL}/api/chat/stream`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        message: message,
                        username: currentUser || 'anonymous'
                    })
                });

                removeLoadingIndicator();

                if (!response.ok) {
                    const errorMsg = await response.text();
                    throw new Error(errorMsg);
                }

                const botMsgId = 'msg-' + Date.now();
                const botMsg = document.createElement('div');
                botMsg.className = `flex justify-start mb-6`;
                botMsg.innerHTML = `
                    <div class="p-4 max-w-[85%] md:max-w-[75%] bg-white border border-slate-200 text-slate-800 rounded-2xl rounded-tl-sm shadow-sm">
                        <p id="${botMsgId}" class="text-sm md:text-base leading-relaxed"><span class="typing-indicator"><span></span><span></span><span></span></span></p>
                    </div>
                `;
                chatContainer.appendChild(botMsg);
                scrollToBottom();

                const bubbleText = document.getElementById(botMsgId);
                let accumulatedText = "";

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const dataStr = line.slice(6).trim();
                            if (!dataStr || dataStr === '[DONE]') continue;

                            try {
                                const data = JSON.parse(dataStr);
                                if (data.error) {
                                    accumulatedText += `<br><span class="text-red-500">❌ ${data.error}</span>`;
                                } else if (data.content) {
                                    accumulatedText += data.content;
                                }
                                bubbleText.innerHTML = formatMarkdown(accumulatedText);
                                scrollToBottom();
                            } catch (err) {
                                console.error("Error parsing stream JSON:", err, dataStr);
                            }
                        }
                    }
                }
            } catch (error) {
                removeLoadingIndicator();
                appendMessage('bot', `❌ **連線錯誤**\n\n伺服器發生異常或無法連線。\n\n錯誤詳情：${error.message}`);
            }
            sendBtn.disabled = false;
        });

        function formatMarkdown(text) {
            let formatted = text.replace(/\[Doc:\s([^\]]+)\]/g, '<span class="inline-block bg-blue-500/20 text-blue-100 px-2 py-0.5 rounded text-xs font-mono mb-1 mr-1 border border-blue-500/30"><i class="fas fa-paperclip mr-1"></i>$1</span>');
            formatted = formatted.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            formatted = formatted.replace(/\n/g, '<br>');
            return formatted;
        }

        // Initialize
        renderDocumentList();
    </script>
</body>

</html>
