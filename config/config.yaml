# Nanobot Configuration with LiteParse MCP Integration
# Save this file as: nanobot/config/config.yaml

# Model Configuration
model:
  provider: openai
  name: minimax-m2.5
  api_key: "${MINIMAX_API_KEY}"
  base_url: https://api.minimax.chat/v1

  # provider: openai  # or your preferred provider
  # name: gpt-4o  # or gpt-4-turbo, claude-3-5-sonnet, etc.
  # api_key: ${OPENAI_API_KEY}  # Use environment variable
  # # For Azure OpenAI:
  # provider: azure
  # endpoint: ${AZURE_OPENAI_ENDPOINT}
  # deployment: ${AZURE_OPENAI_DEPLOYMENT}
  # api_version: "2024-02-15-preview"

# Tool Configuration
tools:
  enabled:
    # Built-in tools
    - web_search
    - web_fetch
    - filesystem
    - shell
    # LiteParse tools (via MCP)
    - liteparse_parse
    - liteparse_debug

# MCP Servers Configuration
mcp:
  servers:
    # LiteParse MCP Server for financial report parsing
    liteparse:
      # Option 1: Connect to Docker container (recommended for production)
      type: http
      url: http://liteparse-mcp:3000
      
      # Option 2: Run locally via stdio (for development)
      # type: stdio
      # command: node
      # args:
      #   - /path/to/liteparse-mcp-server/index.js
      # cwd: /path/to/liteparse-mcp-server
      
      # Tools to expose from this server
      tools:
        - parse_financial_table
        - get_pdf_screenshot
        - query_financial_data
      
      # Timeout settings
      timeout: 300  # 5 minutes for large PDFs
      
      # Retry settings
      retry:
        max_attempts: 3
        delay: 5

# Memory Configuration
memory:
  enabled: true
  type: local  # local, redis, or postgres
  max_tokens: 100000  # Adjust based on your model's context window

# Heartbeat Configuration
heartbeat:
  enabled: true
  interval_minutes: 30
  prompt: |
    Read HEARTBEAT.md if it exists (workspace context). Follow it strictly.
    Do not infer or repeat old tasks from prior chats.
    If nothing needs attention, reply HEARTBEAT_OK.

# Channel Configuration (choose your interface)
channels:
  # Webchat interface (default)
  webchat:
    enabled: true
    port: 8080
    host: 0.0.0.0
    
  # Discord (optional)
  # discord:
  #   enabled: false
  #   bot_token: ${DISCORD_BOT_TOKEN}
  #   channel_id: ${DISCORD_CHANNEL_ID}
  
  # Telegram (optional)
  # telegram:
  #   enabled: false
  #   bot_token: ${TELEGRAM_BOT_TOKEN}

# Logging Configuration
logging:
  level: INFO  # DEBUG, INFO, WARNING, ERROR
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  
  # Log to file
  file:
    enabled: true
    path: /app/.data/logs/nanobot.log
    max_size_mb: 10
    backup_count: 3

# Security Configuration
security:
  # Restrict file system access
  allowed_paths:
    - /data/pdfs
    - /app/.data
  
  # Network restrictions
  allowed_domains:
    - api.openai.com
    - api.anthropic.com
    # Add your LLM provider domains

# Performance Tuning
performance:
  # Concurrent tool executions
  max_concurrent_tools: 5
  
  # Token budget per turn
  max_tokens_per_turn: 4000
  
  # Enable prompt caching (if supported by provider)
  prompt_cache: true
