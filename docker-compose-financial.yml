x-common-config: &common-config
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - ./config:/app/config
    - ~/.nanobot:/root/.nanobot
    - "C:/Users/sammi_hung/Desktop/SFC_AI/sfc_poc/LightRAG/data/input/__enqueued__:/data/pdfs"

services:
  # PostgreSQL Database - Financial Metrics Storage
  postgres-financial:
    image: pgvector/pgvector:pg16
    container_name: postgres-financial
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: annual_reports
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password_change_me
      POSTGRES_INITDB_ARGS: "-E UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./storage/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  # MongoDB - Document Storage
  mongodb-docs:
    image: mongo:7
    container_name: mongodb-docs
    restart: unless-stopped
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongo
      MONGO_INITDB_ROOT_PASSWORD: mongo_password_change_me
      MONGO_INITDB_DATABASE: annual_reports
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # LiteParse MCP Server - Financial PDF parsing
  liteparse-mcp:
    build:
      context: ./liteparse-mcp-server
      dockerfile: Dockerfile
    volumes:
      - "C:/Users/sammi_hung/Desktop/SFC_AI/sfc_poc/LightRAG/data/input/__enqueued__:/data/pdfs"
    networks:
      - default
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # Nanobot Gateway - Main bot service
  nanobot-gateway:
    container_name: nanobot-gateway
    <<: *common-config
    command: ["nanobot", "gateway", "--config", "/app/config/config.json"]
    restart: unless-stopped
    ports:
      - "18790:18790"
      - "8081:8081"
    environment:
      - NANOBOT_CONFIG=/app/config/config.json
      - LOG_LEVEL=DEBUG
      - HTTPX_LOG_LEVEL=DEBUG
      - DATABASE_URL=postgresql://postgres:postgres_password_change_me@postgres-financial:5432/annual_reports
      - MONGODB_URL=mongodb://mongo:mongo_password_change_me@mongodb-docs:27017/annual_reports
    depends_on:
      postgres-financial:
        condition: service_healthy
      mongodb-docs:
        condition: service_healthy
      liteparse-mcp:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  # Web UI - Financial Chat Interface
  nanobot-webui:
    build:
      context: ./webui
      dockerfile: Dockerfile
    container_name: nanobot-webui
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8080", "--reload"]
    volumes:
      - "C:/Users/sammi_hung/Desktop/SFC_AI/sfc_poc/LightRAG/data/input/__enqueued__:/data/pdfs:ro"
      - ./webui:/app
    ports:
      - "3000:8080"
    environment:
      - MCP_SERVER_URL=http://liteparse-mcp:3000
      - PDF_DATA_DIR=/data/pdfs
      - DATABASE_URL=postgresql://postgres:postgres_password_change_me@postgres-financial:5432/annual_reports
      - MONGODB_URL=mongodb://mongo:mongo_password_change_me@mongodb-docs:27017/annual_reports
      - PYTHONUNBUFFERED=1
    depends_on:
      - liteparse-mcp
      - nanobot-gateway
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
  
  nanobot-cli:
    <<: *common-config
    profiles:
      - cli
    command: ["status"]
    stdin_open: true
    tty: true

volumes:
  postgres_data:
    driver: local
  mongodb_data:
    driver: local

networks:
  default:
    driver: bridge
