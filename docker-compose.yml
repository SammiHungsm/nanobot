x-common-config: &common-config
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    # Mount config for runtime customization (optional)
    - ./config:/app/config
    - ~/.nanobot:/root/.nanobot

services:
  # LiteParse MCP Server - Financial PDF parsing
  liteparse-mcp:
    build:
      context: ./liteparse-mcp-server
      dockerfile: Dockerfile
    volumes:
      - ./data/pdfs:/data/pdfs
    networks:
      - default
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

  # Nanobot Gateway - Main bot service
  nanobot-gateway:
    container_name: nanobot-gateway
    <<: *common-config
    command: ["nanobot", "gateway", "--config", "/app/config/config.json"]
    restart: unless-stopped
    ports:
      - 18790:18790
      - 8080:8080
    environment:
      - NANOBOT_CONFIG=/app/config/config.json
      - MINIMAX_API_KEY=sk-sp-28b3d4d8ba97410d9e464eaa3f8fde4c
    depends_on:
      - liteparse-mcp
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
  
  # Web UI - Financial Chat Interface
  nanobot-webui:
    build:
      context: ./webui
      dockerfile: Dockerfile
    container_name: nanobot-webui
    volumes:
      - ./data/pdfs:/data/pdfs:ro
      - ./webui:/app:ro
    ports:
      - 3000:8080
    environment:
      - MCP_SERVER_URL=http://liteparse-mcp:3000
      - PDF_DATA_DIR=/data/pdfs
      - PYTHONUNBUFFERED=1
    depends_on:
      - liteparse-mcp
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
  
  nanobot-cli:
    <<: *common-config
    profiles:
      - cli
    command: ["status"]
    stdin_open: true
    tty: true
