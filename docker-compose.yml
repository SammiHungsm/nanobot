x-common-config: &common-config
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - ./config:/app/config
    - ~/.nanobot:/root/.nanobot
    - pdf_upload_data:/data/pdfs  # Named volume for PDF uploads
    - ./data/raw:/app/data/raw

services:
  # PostgreSQL Database - Financial Metrics Storage
  postgres-financial:
    image: pgvector/pgvector:pg16
    container_name: postgres-financial
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: annual_reports
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password_change_me
      POSTGRES_INITDB_ARGS: "-E UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./storage/init_complete.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    command: >
      postgres 
      -c shared_preload_libraries=vector 
      -c max_connections=200

  # Nanobot Gateway - Main bot service
  nanobot-gateway:
    container_name: nanobot-gateway
    <<: *common-config
    command: ["nanobot", "gateway", "--config", "/app/config/config.json"]
    restart: unless-stopped
    ports:
      - "18790:18790"
      - "8081:8081"
    environment:
      - NANOBOT_CONFIG=/app/config/config.json
      - LOG_LEVEL=DEBUG
      - HTTPX_LOG_LEVEL=DEBUG
      - DATABASE_URL=postgresql://postgres:postgres_password_change_me@postgres-financial:5432/annual_reports
    depends_on:
      postgres-financial:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  # Web UI - Financial Chat Interface
  nanobot-webui:
    build:
      context: ./webui
      dockerfile: Dockerfile
    container_name: nanobot-webui
    command: ["python", "-m", "app.main"]
    volumes:
      - pdf_upload_data:/data/pdfs
      - ./webui/uploads:/app/uploads
      - ./webui/outputs:/app/outputs
    ports:
      - "3000:8080"
    environment:
      - PDF_UPLOAD_DIR=/app/uploads
      - PDF_OUTPUT_DIR=/app/outputs
      - DATABASE_URL=postgresql://postgres:postgres_password_change_me@postgres-financial:5432/annual_reports
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
    depends_on:
      postgres-financial:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
  
  # Vanna AI Service - Text-to-SQL with persistence
  vanna-service:
    build:
      context: ./vanna-service
      dockerfile: Dockerfile
    container_name: vanna-service
    volumes:
      - vanna_data:/app/data
    environment:
      - DATABASE_URL=postgresql://postgres:postgres_password_change_me@postgres-financial:5432/annual_reports
      - VANNA_MODEL=financial-sql
    depends_on:
      - postgres-financial
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
  
  # Ingestion Service - PDF Processing
  ingestion-worker:
    <<: *common-config
    container_name: ingestion-worker
    profiles:
      - worker
    command: ["python", "-m", "nanobot.ingestion.batch_processor"]
    environment:
      - DATABASE_URL=postgresql://postgres:postgres_password_change_me@postgres-financial:5432/annual_reports
      - DATA_DIR=/app/data/raw
      - PDF_INPUT_DIR=/data/pdfs
      - MAX_CONCURRENT_TASKS=5
      - BATCH_SIZE=10
    depends_on:
      - postgres-financial
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
  
  nanobot-cli:
    <<: *common-config
    profiles:
      - cli
    command: ["status"]
    stdin_open: true
    tty: true

volumes:
  postgres_data:
    driver: local
  vanna_data:
    driver: local
  pdf_upload_data:
    driver: local

networks:
  default:
    driver: bridge
