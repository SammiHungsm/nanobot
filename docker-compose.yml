x-common-config: &common-config
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - ./config:/app/config
    - ~/.nanobot:/root/.nanobot
    - pdf_upload_data:/data/pdfs  # Named volume for PDF uploads
    - ./data/raw:/app/data/raw

services:
  # PostgreSQL Database - Financial Metrics Storage
  postgres-financial:
    image: pgvector/pgvector:pg16
    container_name: postgres-financial
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-annual_reports}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_password_change_me}
      POSTGRES_INITDB_ARGS: "-E UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./storage/init_complete.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    command: >
      postgres 
      -c shared_preload_libraries=vector 
      -c max_connections=200

  # Neo4j Graph Database - Entity Relations & Knowledge Graph
  neo4j:
    image: neo4j:5-community
    container_name: neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"  # Browser UI
      - "7687:7687"  # Bolt protocol
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-password}
      - BLOBS_STORAGE__ENABLED=false
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_initial__size=256M
      - NEO4J_dbms_memory_heap_max__size=512M
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./storage/neo4j_import:/import
      - ./storage/neo4j_import/init.sh:/startup/init.sh
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-password}
      - BLOBS_STORAGE__ENABLED=false
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_initial__size=256M
      - NEO4J_dbms_memory_heap_max__size=512M
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_startup_max_wait_time=60
    command: "/startup/init.sh"
    healthcheck:
      test: ["CMD", "neo4j", "status", "--health-status"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G

  # Nanobot Gateway - Main bot service
  nanobot-gateway:
    container_name: nanobot-gateway
    <<: *common-config
    command: ["nanobot", "gateway", "--config", "/app/config/config.json"]
    restart: unless-stopped
    env_file:           
      - .env  
    ports:
      - "18790:18790"
      - "8081:8081"
    environment:
      - NANOBOT_CONFIG=/app/config/config.json
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      - HTTPX_LOG_LEVEL=DEBUG
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres_password_change_me}@postgres-financial:5432/${POSTGRES_DB:-annual_reports}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - DASHSCOPE_API_BASE=${DASHSCOPE_API_BASE:-https://coding.dashscope.aliyuncs.com/v1}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LLAMA_CLOUD_API_KEY=${LLAMA_CLOUD_API_KEY}
      - LLAMAPARSE_TIER=${LLAMAPARSE_TIER:-agentic}
      - NEO4J_HOST=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
    volumes:
      - ./config:/app/config
      - ~/.nanobot:/root/.nanobot
      - ./data/uploads:/app/data/uploads  
      - ./data/raw:/app/data/raw
    depends_on:
      postgres-financial:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  # Web UI - Financial Chat Interface
  nanobot-webui:
    build:
      context: .
      dockerfile: webui/Dockerfile
    container_name: nanobot-webui
    env_file:
      - .env
    volumes:
      - ./data/uploads:/app/data/uploads
      - ./data/output:/app/data/output
      - ./data/raw:/app/data/raw
      - ./nanobot:/app/nanobot:ro  
      - ./config:/app/config  
    ports:
      - "3000:8080"
    environment:
      - UPLOAD_DIR=/app/data/uploads
      - OUTPUT_DIR=/app/data/output
      - DATA_DIR=/app/data/raw
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres_password_change_me}@postgres-financial:5432/${POSTGRES_DB:-annual_reports}
      - GATEWAY_URL=http://nanobot-gateway:8081
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
      - NANOBOT_CONFIG=/app/config/config.json  
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - DASHSCOPE_API_BASE=${DASHSCOPE_API_BASE:-https://qianfan.baidubce.com/v2/coding}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LLAMA_CLOUD_API_KEY=${LLAMA_CLOUD_API_KEY}
      - LLAMAPARSE_TIER=${LLAMAPARSE_TIER:-agentic}
      - NEO4J_HOST=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
    depends_on:
      postgres-financial:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
  
  # Ingestion Service - PDF Processing
  ingestion-worker:
    <<: *common-config
    container_name: ingestion-worker
    env_file:           
      - .env
    profiles:
      - worker
    command: ["python", "-m", "nanobot.ingestion.batch_processor"]
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres_password_change_me}@postgres-financial:5432/${POSTGRES_DB:-annual_reports}
      - DATA_DIR=/app/data/raw
      - PDF_INPUT_DIR=/data/pdfs
      - MAX_CONCURRENT_TASKS=${MAX_CONCURRENT_TASKS:-5}
      - BATCH_SIZE=${BATCH_SIZE:-10}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LLAMA_CLOUD_API_KEY=${LLAMA_CLOUD_API_KEY}
      - LLAMAPARSE_TIER=${LLAMAPARSE_TIER:-agentic}
      - NEO4J_HOST=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
    depends_on:
      postgres-financial:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
  
  nanobot-cli:
    <<: *common-config
    profiles:
      - cli
    command: ["status"]
    stdin_open: true
    tty: true

volumes:
  postgres_data:
    driver: local
  pdf_upload_data:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local

networks:
  default:
    driver: bridge
