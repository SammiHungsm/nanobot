# ===========================================
# Docker Compose GPU Override (v3.2)
# ===========================================
# 用于启用 GPU 加速 LLM 推理
# 
# 使用方式：
# docker-compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
#
# 注意：
# - PDF 解析使用 LlamaParse Cloud API（不需要本地 GPU）
# - GPU 仅用于 LLM 推理（Ollama/vLLM）
# - 需要安装 NVIDIA Container Toolkit
#
# 前置条件：
# 1. 安装 NVIDIA 驱动
# 2. 安装 NVIDIA Container Toolkit: https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html
# 3. 运行 nvidia-ctk system configure --set=nvidia-container-cli.no-cgroups=true
# ===========================================

services:
  # ===========================================
  # Nanobot Gateway - GPU 加速 LLM 推理
  # ===========================================
  nanobot-gateway:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      # 🌟 GPU 配置
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      # 🌟 Torch 配置
      - TORCH_DEVICE=cuda
      - CUDA_VISIBLE_DEVICES=0
      # 🌟 LLM Backend（可选：local 或 ollama）
      - LLM_BACKEND=${LLM_BACKEND:-api}  # 默认 API，可改为 local/ollama
      # 🌟 vLLM 配置（如果使用 local 模式）
      - VLLM_PORT=${VLLM_PORT:-5000}
      - VLLM_MODEL=${VLLM_MODEL:-Qwen/Qwen2.5-VL-7B-Instruct}
      # 🌟 Ollama 配置（如果使用 ollama 模式）
      - OLLAMA_HOST=${OLLAMA_HOST:-host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5-vl:7b}
    volumes:
      # 🌟 添加 CUDA 相关 volume（可选）
      - /usr/lib/wsl/lib:/usr/lib/wsl/lib:ro  # WSL2 GPU 支持

  # ===========================================
  # Vanna Service - GPU 加速（可选）
  # ===========================================
  vanna-service:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - TORCH_DEVICE=cuda

  # ===========================================
  # Ollama 服务（可选 - 如果想在 Docker 内运行）
  # ===========================================
  # 注意：通常 Ollama 在本机运行，而不是 Docker 内
  # 如果想在 Docker 内运行，取消注释以下配置
  #
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: all
  #             capabilities: [gpu]
  #   environment:
  #     - NVIDIA_VISIBLE_DEVICES=all
  #     - NVIDIA_DRIVER_CAPABILITIES=compute,utility
  #   restart: unless-stopped

# ===========================================
# Volumes
# ===========================================
volumes:
  ollama_data:
    driver: local